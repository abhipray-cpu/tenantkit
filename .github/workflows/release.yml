name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.21'
  GONOSUMDB: "github.com/abhipray-cpu/tenantkit*"
  GOPROXY: "direct"

jobs:
  release:
    name: Release Pipeline  # lint → test → build → security → release → notify (linear)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenantkit
          POSTGRES_PASSWORD: tenantkit_secret
          POSTGRES_DB: tenantkit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # ── Download all workspace deps (GOPROXY=direct bypasses stale proxy cache) ─
      - name: Download dependencies
        run: |
          cd tenantkit && go mod download || true
          for dir in adapters/*/; do
            (cd "$dir" && go mod download) || true
          done

      # ── Step 1: Lint ────────────────────────────────────────────────
      - name: "[1/6] Lint"
        uses: golangci/golangci-lint-action@v4
        with:
          version: v2.8.0
          args: --timeout=5m
          working-directory: tenantkit

      # ── Step 2: Unit Tests ──────────────────────────────────────────
      - name: "[2/6] Unit tests — core"
        run: |
          cd tenantkit && go test -v -race -coverprofile=coverage.out ./...

      - name: "[2/6] Unit tests — adapters (no infra)"
        run: |
          for dir in adapters/limiter-memory adapters/quota-memory adapters/metrics-noop; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race ./...) || exit 1
          done

      - name: "[2/6] Unit tests — adapters (Redis)"
        run: |
          for dir in adapters/limiter-redis adapters/quota-redis; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race ./...) || exit 1
          done

      - name: "[2/6] Unit tests — HTTP adapters"
        run: |
          for dir in adapters/http-gin adapters/http-echo adapters/http-chi adapters/http-fiber adapters/http-stdlib; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race ./...) || exit 1
          done

      - name: "[2/6] Unit tests — DB adapters"
        run: |
          for dir in adapters/gorm adapters/sqlx adapters/sql adapters/metrics-prometheus; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race ./...) || exit 1
          done

      # ── Step 3: Build ───────────────────────────────────────────────
      - name: "[3/6] Build — linux/amd64"
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          cd tenantkit && go build -v ./...
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

      - name: "[3/6] Build — darwin/arm64"
        env:
          GOOS: darwin
          GOARCH: arm64
        run: |
          cd tenantkit && go build -v ./...
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

      - name: "[3/6] Build — windows/amd64"
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          cd tenantkit && go build -v ./...
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

      # ── Step 4: Security Scan ───────────────────────────────────────
      - name: "[4/6] Security scan"
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "=== Scanning core ==="
          (cd tenantkit && gosec ./...)
          for dir in adapters/*/; do
            echo "=== Scanning $dir ==="
            (cd "$dir" && gosec ./...) || true
          done

      # ── Step 5: Create GitHub Release ──────────────────────────────
      - name: "[5/6] Generate changelog"
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "[5/6] Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changes }}

            ## Installation

            ```bash
            go get github.com/abhipray-cpu/tenantkit/tenantkit@${{ github.ref_name }}
            ```

            ## Quick Start

            ```go
            import "github.com/abhipray-cpu/tenantkit/tenantkit"

            wrappedDB, err := tenantkit.Wrap(db, tenantkit.Config{
                TenantTables: []string{"users", "orders"},
                TenantColumn: "tenant_id",
            })
            ```

            See [Usage Guide](./docs/usage.md) for detailed documentation.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 6: Notify pkg.go.dev ───────────────────────────────────
      - name: "[6/6] Notify Go Module Proxy"
        run: |
          for mod in \
            "github.com/abhipray-cpu/tenantkit/tenantkit" \
            "github.com/abhipray-cpu/tenantkit/domain" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-gin" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-echo" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-chi" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-fiber" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-stdlib" \
            "github.com/abhipray-cpu/tenantkit/adapters/gorm" \
            "github.com/abhipray-cpu/tenantkit/adapters/sqlx" \
            "github.com/abhipray-cpu/tenantkit/adapters/sql" \
            "github.com/abhipray-cpu/tenantkit/adapters/postgres" \
            "github.com/abhipray-cpu/tenantkit/adapters/limiter-memory" \
            "github.com/abhipray-cpu/tenantkit/adapters/limiter-redis" \
            "github.com/abhipray-cpu/tenantkit/adapters/quota-memory" \
            "github.com/abhipray-cpu/tenantkit/adapters/quota-redis" \
            "github.com/abhipray-cpu/tenantkit/adapters/metrics-noop" \
            "github.com/abhipray-cpu/tenantkit/adapters/metrics-prometheus"; do
            echo "Notifying proxy for $mod@${{ github.ref_name }}"
            curl -s "https://proxy.golang.org/$mod/@v/${{ github.ref_name }}.info" || true
          done
