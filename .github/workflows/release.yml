name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.22'
  GONOSUMDB: "github.com/abhipray-cpu/tenantkit*"
  GOPROXY: "direct"

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Lint
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: (cd tenantkit && go mod download) || true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          args: --timeout=5m
          working-directory: tenantkit

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Unit Tests (parallel groups)
# ─────────────────────────────────────────────────────────────────────────────
  test-core:
    name: Test / core
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenantkit
          POSTGRES_PASSWORD: tenantkit_secret
          POSTGRES_DB: tenantkit_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: (cd tenantkit && go mod download) || true
      - name: Run tests
        run: (cd tenantkit && go test -v -race ./...)

  test-adapters-no-infra:
    name: Test / adapters (no infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: |
          for dir in adapters/limiter-memory adapters/quota-memory adapters/metrics-noop; do
            (cd "$dir" && go mod download) || true
          done
      - name: Run tests
        run: |
          for dir in adapters/limiter-memory adapters/quota-memory adapters/metrics-noop; do
            echo "=== Testing $dir ===" && (cd "$dir" && go test -v -race ./...) || exit 1
          done

  test-adapters-redis:
    name: Test / adapters (Redis)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: |
          for dir in adapters/limiter-redis adapters/quota-redis; do
            (cd "$dir" && go mod download) || true
          done
      - name: Run tests
        run: |
          for dir in adapters/limiter-redis adapters/quota-redis; do
            echo "=== Testing $dir ===" && (cd "$dir" && go test -v -race ./...) || exit 1
          done

  test-adapters-http:
    name: Test / adapters (HTTP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: |
          for dir in adapters/http-gin adapters/http-echo adapters/http-chi adapters/http-fiber adapters/http-stdlib; do
            (cd "$dir" && go mod download) || true
          done
      - name: Run tests
        run: |
          for dir in adapters/http-gin adapters/http-echo adapters/http-chi adapters/http-fiber adapters/http-stdlib; do
            echo "=== Testing $dir ===" && (cd "$dir" && go test -v -race ./...) || exit 1
          done

  test-adapters-db:
    name: Test / adapters (DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenantkit
          POSTGRES_PASSWORD: tenantkit_secret
          POSTGRES_DB: tenantkit_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: |
          for dir in adapters/gorm adapters/sqlx adapters/sql adapters/metrics-prometheus; do
            (cd "$dir" && go mod download) || true
          done
      - name: Run tests
        run: |
          for dir in adapters/gorm adapters/sqlx adapters/sql adapters/metrics-prometheus; do
            echo "=== Testing $dir ===" && (cd "$dir" && go test -v -race ./...) || exit 1
          done

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Build (cross-platform matrix)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: |
          (cd tenantkit && go mod download) || true
          for dir in adapters/*/; do (cd "$dir" && go mod download) || true; done
      - name: Build all modules
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          (cd tenantkit && go build -v ./...)
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Security Scan
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [lint, test-core, test-adapters-no-infra, test-adapters-redis, test-adapters-http, test-adapters-db, build]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: |
          (cd tenantkit && go mod download) || true
          for dir in adapters/*/; do (cd "$dir" && go mod download) || true; done
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Scan core
        run: (cd tenantkit && gosec -exclude=G104 ./...)
      - name: Scan adapters
        run: |
          for dir in adapters/*/; do
            echo "=== Scanning $dir ==="
            (cd "$dir" && gosec -exclude=G104 ./...) || true
          done

# ─────────────────────────────────────────────────────────────────────────────
# Job 5: Create GitHub Release (only after all checks pass)
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changes }}

            ## Installation

            ```bash
            go get github.com/abhipray-cpu/tenantkit/tenantkit@${{ github.ref_name }}
            ```

            ## Quick Start

            ```go
            import "github.com/abhipray-cpu/tenantkit/tenantkit"

            wrappedDB, err := tenantkit.Wrap(db, tenantkit.Config{
                TenantTables: []string{"users", "orders"},
                TenantColumn: "tenant_id",
            })
            ```

            See [Usage Guide](./docs/usage.md) for detailed documentation.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 6: Notify pkg.go.dev
# ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify Go Module Proxy
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Ping proxy for all modules
        run: |
          for mod in \
            "github.com/abhipray-cpu/tenantkit/tenantkit" \
            "github.com/abhipray-cpu/tenantkit/domain" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-gin" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-echo" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-chi" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-fiber" \
            "github.com/abhipray-cpu/tenantkit/adapters/http-stdlib" \
            "github.com/abhipray-cpu/tenantkit/adapters/gorm" \
            "github.com/abhipray-cpu/tenantkit/adapters/sqlx" \
            "github.com/abhipray-cpu/tenantkit/adapters/sql" \
            "github.com/abhipray-cpu/tenantkit/adapters/postgres" \
            "github.com/abhipray-cpu/tenantkit/adapters/limiter-memory" \
            "github.com/abhipray-cpu/tenantkit/adapters/limiter-redis" \
            "github.com/abhipray-cpu/tenantkit/adapters/quota-memory" \
            "github.com/abhipray-cpu/tenantkit/adapters/quota-redis" \
            "github.com/abhipray-cpu/tenantkit/adapters/metrics-noop" \
            "github.com/abhipray-cpu/tenantkit/adapters/metrics-prometheus"; do
            echo "Notifying proxy for $mod@${{ github.ref_name }}"
            curl -s "https://proxy.golang.org/$mod/@v/${{ github.ref_name }}.info" || true
          done
