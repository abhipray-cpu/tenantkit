name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: '1.21'
  # Use direct VCS for internal modules — the proxy caches don't know our new tag yet
  GONOSUMDB: "github.com/abhipray-cpu/tenantkit*"
  GOFLAGS: ""
  GOPROXY: "direct"

jobs:
  ci:
    name: CI Pipeline  # lint → unit tests → build → security (linear)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenantkit
          POSTGRES_PASSWORD: tenantkit_secret
          POSTGRES_DB: tenantkit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # ── Download all workspace deps (GOPROXY=direct bypasses stale proxy cache) ─
      - name: Download dependencies
        run: |
          cd tenantkit && go mod download || true
          for dir in adapters/*/; do
            (cd "$dir" && go mod download) || true
          done

      # ── Step 1: Lint ────────────────────────────────────────────────
      - name: "[1/4] Lint"
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.8.0
          args: --timeout=5m
          working-directory: tenantkit

      # ── Step 2: Unit Tests ──────────────────────────────────────────
      - name: "[2/4] Unit tests — core"
        run: |
          cd tenantkit && go test -v -race -coverprofile=coverage.out ./...

      - name: "[2/4] Unit tests — adapters (no infra)"
        run: |
          for dir in adapters/limiter-memory adapters/quota-memory adapters/metrics-noop; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race ./...) || exit 1
          done

      - name: "[2/4] Unit tests — adapters (Redis)"
        run: |
          for dir in adapters/limiter-redis adapters/quota-redis; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race ./...) || exit 1
          done

      - name: "[2/4] Unit tests — HTTP adapters"
        run: |
          for dir in adapters/http-gin adapters/http-echo adapters/http-chi adapters/http-fiber adapters/http-stdlib; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race ./...) || exit 1
          done

      - name: "[2/4] Unit tests — DB adapters"
        run: |
          for dir in adapters/gorm adapters/sqlx adapters/sql adapters/metrics-prometheus; do
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race ./...) || exit 1
          done

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: tenantkit/coverage.out
          fail_ci_if_error: false

      # ── Step 3: Build (cross-platform) ─────────────────────────────
      - name: "[3/4] Build — linux/amd64"
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          cd tenantkit && go build -v ./...
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

      - name: "[3/4] Build — linux/arm64"
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          cd tenantkit && go build -v ./...
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

      - name: "[3/4] Build — darwin/amd64"
        env:
          GOOS: darwin
          GOARCH: amd64
        run: |
          cd tenantkit && go build -v ./...
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

      - name: "[3/4] Build — darwin/arm64"
        env:
          GOOS: darwin
          GOARCH: arm64
        run: |
          cd tenantkit && go build -v ./...
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

      - name: "[3/4] Build — windows/amd64"
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          cd tenantkit && go build -v ./...
          for dir in adapters/*/; do (cd "$dir" && go build -v ./...) || exit 1; done

      # ── Step 4: Security Scan ───────────────────────────────────────
      - name: "[4/4] Security scan"
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "=== Scanning core ==="
          (cd tenantkit && gosec ./...)
          for dir in adapters/*/; do
            echo "=== Scanning $dir ==="
            (cd "$dir" && gosec ./...) || true
          done
