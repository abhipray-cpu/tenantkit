version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - nilerr
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gosec:
      excludes:
        - G101
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: unexported-return
          disabled: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - exitAfterDefer
        - sqlQuery
    exhaustive:
      default-signifies-exhaustive: true
    errcheck:
      check-type-assertions: true
  exclusions:
    presets:
      - common-false-positives
    rules:
      - path: "(.+)_test\\.go"
        linters:
          - errcheck
          - gosec
          - unparam
          - errorlint
          - govet
          - ineffassign
          - staticcheck
          - predeclared
      - path: "example"
        linters:
          - gocritic
          - errcheck
